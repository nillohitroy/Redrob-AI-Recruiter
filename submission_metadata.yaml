# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        

ai_usage_summary: |
  Used Gemini as an interactive architectural guide and pair-programmer to design the Two-Stage Cascade ranking pipeline.
  
# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A highly optimized Two-Stage Cascade Ranker. 
  
  Phase 1: All 100K profiles were embedded using sentence-transformers (all-MiniLM-L6-v2) into a FAISS index, alongside pre-computed behavioral multipliers and honeypot flags. 
  
  Phase 2: The pipeline vectorizes the JD, instantly queries FAISS for the top 2000 semantic matches, and applies the behavioral multipliers. It then parses the JSON for only those 2000 candidates to apply strict regex disqualifiers for pure-consultancy or pure-research backgrounds. 
  
  Phase 3: Deployed a quantized Qwen1.5-0.5B-Chat via llama-cpp natively on the CPU to generate grounded, 1-sentence justifications based purely on extracted JSON facts for the final Top 100.

